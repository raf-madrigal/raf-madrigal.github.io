title: Rafael Madrigal
description: >-
  ML Engineer, Data Scientist, and Research Engineer based in Toronto.
  Building intelligent systems with NLP, LLMs, and Responsible AI.
url: "https://raf-madrigal.github.io"
baseurl: ""

author:
  name: Rafael Madrigal
  email: rfgmadrigal@gmail.com

# Social
github_username: raf-madrigal
linkedin_username: raf-madrigal

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - minima.gemspec
  - README.md
  - CODE_OF_CONDUCT.md
  - History.markdown
  - LICENSE.txt
  - script/
  - .editorconfig
  - readme_banner.svg
  - screenshot.png
