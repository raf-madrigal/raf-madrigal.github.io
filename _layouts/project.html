---
layout: base
---

<div class="container">
  <article class="post">
    <header class="post-header">
      <a href="{{ '/works/' | relative_url }}" class="back-link">&larr; Back to Works</a>
      <h1 class="post-title">{{ page.title }}</h1>
      {%- if page.tags.size > 0 -%}
        <div class="post-meta">
          <span class="post-tags">
            {%- for tag in page.tags -%}
              <span class="tag">{{ tag }}</span>
            {%- endfor -%}
          </span>
        </div>
      {%- endif -%}
    </header>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
